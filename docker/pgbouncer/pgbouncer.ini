[databases]
aarya_clothing = host=postgres port=5432 dbname=aarya_clothing

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction

# Connection limits - OPTIMIZED
max_client_conn = 1000
default_pool_size = 40        # 4 services × 8 SA pool + 8 spare = ~40 server conns/db
min_pool_size = 10
reserve_pool_size = 10
reserve_pool_timeout = 5

# Timeouts - OPTIMIZED
server_lifetime = 1800        # Reduced from 3600 to 1800
server_idle_timeout = 300     # Reduced from 600 to 300
server_connect_timeout = 10   # Reduced from 15 to 10
server_login_retry = 3        # Reduced from 5 to 3
query_timeout = 25            # Reduced from 30 to 25
query_wait_timeout = 8        # Reduced from 10 to 8
client_idle_timeout = 0
client_login_timeout = 20     # Reduced from 30 to 20

# Performance - OPTIMIZED
tcp_keepalive = 1
tcp_keepcnt = 3               # Reduced from 5 to 3
tcp_keepidle = 20             # Reduced from 30 to 20
tcp_keepintvl = 5             # Reduced from 10 to 5

# Prepared statements - ADDED
prepared_statements = 1

# Logging - OPTIMIZED
log_connections = 0           # Reduce log noise
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

# Admin settings
admin_users = postgres
stats_users = stats, postgres
