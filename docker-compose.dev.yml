# Docker Compose Development Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This file enables hot reloading for all services by mounting source code
# as volumes. Changes to code are reflected instantly without rebuilding containers.
#
# Benefits:
# - Instant hot reload for Python (Uvicorn --reload) and Next.js (npm run dev)
# - Preserves Nginx routing architecture (no CORS issues)
# - No container rebuilds needed during development

services:
  # ============================================================
  # CORE SERVICE - Hot Reload
  # ============================================================
  core:
    volumes:
      - ./services/core:/app
      - ./shared:/app/shared
    # Uvicorn's --reload flag watches for file changes instantly
    command: uvicorn main:app --host 0.0.0.0 --port 5001 --reload
    environment:
      - SERVICE_NAME=core
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@pgbouncer:6432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD:-aarya_clothing_redis_password_2024}@redis:6379/0
      - REDIS_DB=0
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_MINUTES=1440
      - SESSION_EXPIRE_MINUTES=1440
      - ALLOWED_ORIGINS=["http://localhost:6004","http://localhost:6005","http://127.0.0.1:6004","http://127.0.0.1:6005","http://72.61.255.8:6004","http://72.61.255.8:6005"]
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      # Password Policy
      - PASSWORD_MIN_LENGTH=8
      - PASSWORD_REQUIRE_UPPERCASE=true
      - PASSWORD_REQUIRE_LOWERCASE=true
      - PASSWORD_REQUIRE_NUMBER=true
      - PASSWORD_REQUIRE_SPECIAL=false
      # Rate Limiting & Security
      - LOGIN_RATE_LIMIT=5
      - LOGIN_RATE_WINDOW=300
      - MAX_LOGIN_ATTEMPTS=5
      - ACCOUNT_LOCKOUT_MINUTES=30
      # Cookie Settings
      - COOKIE_SECURE=false
      - COOKIE_HTTPONLY=true
      - COOKIE_SAMESITE=lax
      # SMTP Configuration
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_TLS=true
      - EMAIL_FROM=${EMAIL_FROM:-noreply@aaryaclothings.com}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Aarya Clothings}
      # OTP Settings
      - OTP_CODE_LENGTH=6
      - OTP_EXPIRY_MINUTES=10
      - OTP_MAX_ATTEMPTS=3
      - OTP_RESEND_COOLDOWN_MINUTES=1
      - OTP_MAX_RESEND_PER_HOUR=5

  # ============================================================
  # COMMERCE SERVICE - Hot Reload
  # ============================================================
  commerce:
    volumes:
      - ./services/commerce:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 5002 --reload
    environment:
      - SERVICE_NAME=commerce
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@pgbouncer:6432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD:-aarya_clothing_redis_password_2024}@redis:6379/1
      - REDIS_DB=1
      - CORE_SERVICE_URL=http://core:5001
      - CART_TTL_HOURS=168
      - ORDER_TIMEOUT_MINUTES=15
      - ALLOWED_ORIGINS=["http://localhost:6004","http://localhost:6005","http://127.0.0.1:6004","http://127.0.0.1:6005","http://72.61.255.8:6004","http://72.61.255.8:6005"]
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      # JWT Verification
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      # Meilisearch
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_API_KEY=${MEILI_MASTER_KEY:-dev_master_key}
      # R2 Storage (optional)
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-aarya-clothing-images}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_REGION=${R2_REGION:-auto}

  # ============================================================
  # PAYMENT SERVICE - Hot Reload
  # ============================================================
  payment:
    volumes:
      - ./services/payment:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 5003 --reload
    environment:
      - SERVICE_NAME=payment
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@pgbouncer:6432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD:-aarya_clothing_redis_password_2024}@redis:6379/2
      - REDIS_DB=2
      - CORE_SERVICE_URL=http://core:5001
      # JWT Verification
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      # Stripe (test mode)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Razorpay (test mode)
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      # Payment Settings
      - PAYMENT_TIMEOUT_SECONDS=30
      - MAX_RETRY_ATTEMPTS=3
      - PAYMENT_SUCCESS_URL=http://localhost:6005/payment/success
      - PAYMENT_FAILURE_URL=http://localhost:6005/payment/failure
      - ALLOWED_ORIGINS=["http://localhost:6004","http://localhost:6005","http://127.0.0.1:6004","http://127.0.0.1:6005","http://72.61.255.8:6004","http://72.61.255.8:6005"]
      - DEBUG=true
      - LOG_LEVEL=DEBUG

  # ============================================================
  # ADMIN SERVICE - Hot Reload
  # ============================================================
  admin:
    volumes:
      - ./services/admin:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 5004 --reload
    environment:
      - SERVICE_NAME=admin
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@pgbouncer:6432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD:-aarya_clothing_redis_password_2024}@redis:6379/3
      - REDIS_DB=3
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      - CORE_SERVICE_URL=http://core:5001
      - COMMERCE_SERVICE_URL=http://commerce:5002
      - PAYMENT_SERVICE_URL=http://payment:5003
      - ALLOWED_ORIGINS=["http://localhost:6004","http://localhost:6005","http://127.0.0.1:6004","http://127.0.0.1:6005","http://72.61.255.8:6004","http://72.61.255.8:6005"]
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      # R2 Storage (optional)
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-aarya-clothing-images}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_REGION=${R2_REGION:-auto}

  # ============================================================
  # FRONTEND - Next.js Hot Reload
  # ============================================================
  frontend:
    build:
      context: ./frontend_new
      dockerfile: Dockerfile.dev
    volumes:
      # Mount source code for hot reload (excluding node_modules and .next)
      - ./frontend_new:/app
      # Preserve node_modules and .next in container
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=https://aaryaclothing.in
    command: npm run dev
