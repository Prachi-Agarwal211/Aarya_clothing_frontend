<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - Aarya Clothing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .maintenance-container {
            max-width: 600px;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo {
            width: 120px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 36px;
            color: #d946ef;
            margin-bottom: 16px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .apology {
            font-weight: bold;
            color: #555;
        }
        .resume-time {
            font-style: italic;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <h1>AARYA CLOTHING</h1>
        <p class="apology">We apologize for the inconvenience.</p>
        <p>Our website is currently under maintenance to provide you with the best possible shopping experience.</p>
        <p class="resume-time">We will resume back soon. Thank you for your patience!</p>
    </div>
</body>
</html>
