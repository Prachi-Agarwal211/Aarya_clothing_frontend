# Maintenance Mode Configuration
# ENABLED - To disable, comment out this file or change values below

# IP addresses that can bypass maintenance (optional)
map $remote_addr $is_allowed_ip {
    default 0;
}

# Check if request should bypass maintenance
map $request_uri $maintenance_bypass {
    default 0;
    
    # ===== ALWAYS ALLOWED =====
    # Auth routes - needed for admin login
    ^/auth/                      1;
    ^/api/v1/auth/             1;
    
    # Admin routes
    ^/admin/                     1;
    ^/api/v1/admin/            1;
    
    # All API v1 endpoints - needed for order processing
    ^/api/v1/                  1;
    
    # Payment webhooks - critical for payment processing
    ^/api/payment/webhook      1;
    ^/api/v1/webhooks/         1;
    
    # Next.js static files - needed for admin dashboard to load
    ^/_next/                   1;
    
    # Static assets
    ^/logo\.png$               1;
    ^/favicon\.ico$            1;
    
    # ACME challenge for SSL renewal
    ^/.well-known/acme-challenge/ 1;
    
    # Health checks
    ^/health$                  1;
    ^/api/v1/health$           1;
}

# Maintenance mode is ON (change to OFF to disable)
# Map combined bypass and IP allow to serve_maintenance flag
# 00 = not bypassed + not allowed IP -> serve maintenance (1)
# 01 = not bypassed + allowed IP -> allow (0)
# 10 = bypassed + not allowed IP -> allow (0)
# 11 = bypassed + allowed IP -> allow (0)

map $maintenance_bypass$is_allowed_ip $serve_maintenance {
    default      0;  # Maintenance OFF
}
