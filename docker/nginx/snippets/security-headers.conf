# Security Headers Snippet for Nginx
# Include this file in location blocks that have their own add_header directives
# to ensure security headers are consistently applied everywhere.
#
# Background: Nginx location blocks with ANY add_header directive do NOT inherit
# headers from the parent server block. This snippet solves that problem.

# Frame embedding protection - prevents clickjacking
# SAMEORIGIN allows Razorpay payment modal iframe
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS protection (legacy, modern browsers use CSP)
add_header X-XSS-Protection "1; mode=block" always;

# Control referrer information sent with requests
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HTTP Strict Transport Security - enforce HTTPS for 1 year
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Permissions Policy - disable unnecessary browser features
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=*, usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# Cross-Origin policies - prevent cross-origin attacks
# COEP set to 'credentialless' to allow Cloudflare Images and R2 resources
add_header Cross-Origin-Embedder-Policy "credentialless" always;

# COOP set to 'same-origin-allow-popups' to allow Razorpay 3DS popup callbacks
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

# Cross-Origin Resource Policy
add_header Cross-Origin-Resource-Policy "cross-origin" always;

# Content Security Policy - control resource loading
# Includes ALL Razorpay domains for payment processing
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://api.razorpay.com https://lumberjack.razorpay.com https://cdn.razorpay.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://checkout.razorpay.com https://api.razorpay.com https://lumberjack.razorpay.com https://cdn.razorpay.com wss://api.razorpay.com wss://checkout.razorpay.com wss://aaryaclothing.in https://www.google-analytics.com https://*.r2.dev https://pub-7846c786f7154610b57735df47899fa0.r2.dev https://*.r2.cloudflarestorage.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com; worker-src 'self' blob: https://checkout.razorpay.com https://api.razorpay.com https://cdn.razorpay.com; form-action 'self' https://api.razorpay.com; frame-ancestors 'self'; media-src 'self' https://*.r2.dev https://pub-7846c786f7154610b57735df47899fa0.r2.dev https://*.r2.cloudflarestorage.com blob:;" always;
