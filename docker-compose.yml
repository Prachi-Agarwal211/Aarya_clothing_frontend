# Aarya Clothing - Unified Docker Compose
# Single configuration for local development and testing
#
# ARCHITECTURE (one frontend, four API microservices, shared data layer)
# -----------------------------------------------------------------------
# • Frontend:  Next.js (frontend_new) — one app for storefront + customer flows; talks to APIs via nginx.
# • APIs:      4 separate services (own Dockerfiles, ports, health checks):
#                core:5001      auth, users, sessions, OTP, email/SMS, internal notify
#                commerce:5002  catalog, cart, orders, inventory, search
#                payment:5003   gateways, webhooks, payment recovery worker (uses payment Redis DB)
#                admin:5004     staff dashboard, ops (calls core/commerce/payment URLs)
# • Shared:    PostgreSQL (one DB: aarya_clothing), Redis (one instance; logical DB index per service:
#                core=0, commerce=1, payment=2 (+ payment-worker), admin=3) — keys never collide across services.
# • Gateway:   nginx routes /api/... to the correct service (see docker/nginx/nginx.conf).
# • Extra:     meilisearch (search), optional certbot profile — not counted as user-facing microservices.

services:
  # ============================================================
  # DATABASE LAYER
  # ============================================================

  postgres:
    image: pgvector/pgvector:pg15
    container_name: aarya_postgres
    # Production-tuned PostgreSQL parameters for 16GB RAM server.
    # With PgBouncer in transaction mode, max_connections=50 is safe.
    command: >
      postgres
      -c shared_buffers=2GB
      -c work_mem=32MB
      -c effective_cache_size=10GB
      -c max_connections=100
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c maintenance_work_mem=512MB
      -c wal_buffers=64MB
      -c effective_io_concurrency=200
      -c checkpoint_timeout=15min
      -c max_wal_size=2GB
      -c min_wal_size=512MB
    environment:
      POSTGRES_DB: aarya_clothing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/scale_indexes.sql:/docker-entrypoint-initdb.d/02-scale-indexes.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aarya_clothing"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '1.5'
    networks:
      - backend_network
    restart: unless-stopped

  # ============================================================
  # CONNECTION POOLER (PgBouncer)
  # ============================================================

  pgbouncer:
    build:
      context: .
      dockerfile: docker/pgbouncer/Dockerfile
    container_name: aarya_pgbouncer
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - PGBOUNCER_AUTH_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/aarya_clothing
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    expose:
      - "6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - backend_network
    restart: unless-stopped

  # ============================================================
  # CACHE & MESSAGE QUEUE
  # ============================================================

  redis:
    image: redis:7-alpine
    container_name: aarya_redis
    command: >
      redis-server /etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    networks:
      - backend_network
    restart: unless-stopped

  # ============================================================
  # FULL-TEXT SEARCH ENGINE
  # ============================================================

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: aarya_meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-dev_master_key}
      - MEILI_ENV=${MEILI_ENV:-development}
      - MEILI_DB_PATH=/meili_data
    expose:
      - "7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - backend_network
    restart: unless-stopped

  # ============================================================
  # CORE PLATFORM SERVICE (Port 5001)
  # User Management + Authentication + Sessions
  # ============================================================

  core:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    container_name: aarya_core
    env_file:
      - .env
    environment:
      - SERVICE_NAME=core
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_DB=0
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_MINUTES=1440
      - SESSION_EXPIRE_MINUTES=1440
      - ALLOWED_ORIGINS=["http://localhost:6004","http://localhost:6005","http://127.0.0.1:6004","http://127.0.0.1:6005","https://aaryaclothing.in","https://www.aaryaclothing.in"]
      - DEBUG=${AARYA_DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Same secret as commerce/payment — internal order-email API from Commerce
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-aarya_internal_secret_change_me}
      # Password Policy
      - PASSWORD_MIN_LENGTH=8
      - PASSWORD_REQUIRE_UPPERCASE=true
      - PASSWORD_REQUIRE_LOWERCASE=true
      - PASSWORD_REQUIRE_NUMBER=true
      - PASSWORD_REQUIRE_SPECIAL=false
      # Rate Limiting & Security
      - LOGIN_RATE_LIMIT=5
      - LOGIN_RATE_WINDOW=300
      - MAX_LOGIN_ATTEMPTS=5
      - ACCOUNT_LOCKOUT_MINUTES=30
      # Cookie Settings
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - COOKIE_HTTPONLY=true
      - COOKIE_SAMESITE=lax
      # MSG91 SMS API
      - MSG91_AUTH_KEY=${MSG91_AUTH_KEY:-}
      - MSG91_TEMPLATE_ID=${MSG91_TEMPLATE_ID:-}
      - MSG91_SENDER_ID=${MSG91_SENDER_ID:-}
      # Optional: DLT-registered Flow template for order SMS (var1/2/3; separate from OTP template)
      - MSG91_ORDER_FLOW_TEMPLATE_ID=${MSG91_ORDER_FLOW_TEMPLATE_ID:-}
      # SMTP Configuration - Hostinger
      - SMTP_HOST=smtp.hostinger.com
      - SMTP_PORT=465
      - SMTP_USER=noreply@aaryaclothing.in
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_TLS=true
      - EMAIL_FROM=noreply@aaryaclothing.in
      - EMAIL_FROM_NAME=Aarya Clothing
      # OTP Settings
      - OTP_CODE_LENGTH=6
      - OTP_EXPIRY_MINUTES=10
      - OTP_MAX_ATTEMPTS=3
      - OTP_RESEND_COOLDOWN_MINUTES=1
      - OTP_MAX_RESEND_PER_HOUR=5
      # Async OTP email queue + SMTP retries (see services/core/service/email_queue.py)
      - EMAIL_OTP_USE_QUEUE=${EMAIL_OTP_USE_QUEUE:-true}
      - SMTP_SEND_MAX_ATTEMPTS=${SMTP_SEND_MAX_ATTEMPTS:-3}
      # Database connection pool (PgBouncer-compatible)
      - DATABASE_POOL_SIZE=8
      - DATABASE_MAX_OVERFLOW=7
    expose:
      - "5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared

  # ============================================================
  # COMMERCE SERVICE (Port 5002)
  # Product + Inventory + Cart + Order
  # ============================================================

  commerce:
    build:
      context: .
      dockerfile: services/commerce/Dockerfile
    container_name: aarya_commerce
    env_file:
      - .env
    environment:
      - SERVICE_NAME=commerce
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - REDIS_DB=1
      - CORE_SERVICE_URL=http://core:5001
      # Links in order emails (track order, shop) — must match production domain
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-https://aaryaclothing.in}
      - CART_TTL_HOURS=168
      - ORDER_TIMEOUT_MINUTES=15
      - ALLOWED_ORIGINS=["http://localhost:6004","http://localhost:6005","http://127.0.0.1:6004","http://127.0.0.1:6005","https://aaryaclothing.in","https://www.aaryaclothing.in"]
      - DEBUG=${AARYA_DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # JWT Verification
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      # X_API_KEY for semantic search
      - X_API_KEY=${X_API_KEY:-}
      # Meilisearch
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_API_KEY=${MEILI_MASTER_KEY:-dev_master_key}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-aarya_internal_secret_change_me}
      # R2 Storage (optional)
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-aarya-clothing-images}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_REGION=${R2_REGION:-auto}
      # AI / pgvector: embed products on create/update (using key rotation service)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - AI_GROQ_ENABLED=${AI_GROQ_ENABLED:-true}
      - AI_OPENROUTER_ENABLED=${AI_OPENROUTER_ENABLED:-true}
      - AI_GLM_ENABLED=${AI_GLM_ENABLED:-true}
      - AI_NVIDIA_ENABLED=${AI_NVIDIA_ENABLED:-true}
      # Database connection pool (PgBouncer-compatible)
      - DATABASE_POOL_SIZE=8
      - DATABASE_MAX_OVERFLOW=7
    expose:
      - "5002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      core:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.75'
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared

  # ============================================================
  # PAYMENT SERVICE (Port 5003)
  # Payment Processing + Fraud Detection
  # ============================================================

  payment:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    container_name: aarya_payment
    env_file:
      - .env
    environment:
      - SERVICE_NAME=payment
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - REDIS_DB=2
      - CORE_SERVICE_URL=http://core:5001
      # JWT Verification
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      # Razorpay (primary payment gateway)
      - RAZORPAY_KEY_ID
      - RAZORPAY_KEY_SECRET
      - RAZORPAY_WEBHOOK_SECRET
      - RAZORPAY_CHECKOUT_CONFIG_ID
      # Cashfree (alternative payment gateway) - credentials from .env
      - CASHFREE_APP_ID
      - CASHFREE_SECRET_KEY
      - CASHFREE_ENV=production
      # Payment Settings
      - PAYMENT_TIMEOUT_SECONDS=30
      - MAX_RETRY_ATTEMPTS=3
      - PAYMENT_SUCCESS_URL=${PAYMENT_SUCCESS_URL:-https://aaryaclothing.in/payment/success}
      - PAYMENT_FAILURE_URL=${PAYMENT_FAILURE_URL:-https://aaryaclothing.in/payment/failure}
      - PAYMENT_NOTIFY_URL=${PAYMENT_NOTIFY_URL:-https://aaryaclothing.in/api/v1/webhooks/razorpay}
      - COMMERCE_SERVICE_URL=http://commerce:5002
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-aarya_internal_secret_change_me}
      - ALLOWED_ORIGINS=["http://localhost:6004","http://localhost:6005","http://127.0.0.1:6004","http://127.0.0.1:6005","https://aaryaclothing.in","https://www.aaryaclothing.in"]
      - DEBUG=${AARYA_DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Database connection pool (PgBouncer-compatible)
      - DATABASE_POOL_SIZE=8
      - DATABASE_MAX_OVERFLOW=7
    expose:
      - "5003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      core:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared

  # ============================================================
  # ADMIN & STAFF SERVICE (Port 5004)
  # Dashboard + Analytics + Inventory Ops + Chat + Landing Config
  # ============================================================

  admin:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    container_name: aarya_admin
    env_file:
      - .env
    environment:
      - SERVICE_NAME=admin
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/3
      - REDIS_DB=3
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      - CORE_SERVICE_URL=http://core:5001
      - COMMERCE_SERVICE_URL=http://commerce:5002
      - PAYMENT_SERVICE_URL=http://payment:5003
      - ALLOWED_ORIGINS=["http://localhost:6004","http://localhost:6005","http://127.0.0.1:6004","http://127.0.0.1:6005","https://aaryaclothing.in","https://www.aaryaclothing.in"]
      - DEBUG=${AARYA_DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # R2 Storage (optional)
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-aarya-clothing-images}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_REGION=${R2_REGION:-auto}
      # X_API_KEY for semantic search
      - X_API_KEY=${X_API_KEY:-}
      # AI Configuration - Multi-provider with key rotation
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - GLM_MODEL=${GLM_MODEL:-glm-4-flash}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-meta/llama3-70b-instruct}
      - AI_GROQ_ENABLED=${AI_GROQ_ENABLED:-true}
      - AI_OPENROUTER_ENABLED=${AI_OPENROUTER_ENABLED:-true}
      - AI_GLM_ENABLED=${AI_GLM_ENABLED:-true}
      - AI_NVIDIA_ENABLED=${AI_NVIDIA_ENABLED:-true}
      - AI_MAX_HISTORY=${AI_MAX_HISTORY:-8}
      - AI_CUSTOMER_MAX_TOKENS=${AI_CUSTOMER_MAX_TOKENS:-512}
      - AI_ADMIN_MAX_TOKENS=${AI_ADMIN_MAX_TOKENS:-2048}
      # Database connection pool (PgBouncer-compatible)
      - DATABASE_POOL_SIZE=8
      - DATABASE_MAX_OVERFLOW=7
    expose:
      - "5004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      core:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
    networks:
      - backend_network
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared

  # ============================================================
  # FRONTEND (Next.js - Port 6004)
  # ============================================================

  frontend:
    build:
      context: ./frontend_new
      dockerfile: Dockerfile
      args:
        # SSR uses internal Docker URL, client uses window.location.origin
        - NEXT_PUBLIC_API_URL=http://nginx:80
        - NEXT_PUBLIC_INTERNAL_COMMERCE_URL=http://commerce:5002
    container_name: aarya_frontend
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      # SSR needs absolute URL for Node.js fetch() - nginx will proxy to backend
      # Client-side code uses window.location.origin (CSP compliant)
      - NEXT_PUBLIC_API_URL=http://nginx:80
      - NEXT_PUBLIC_INTERNAL_COMMERCE_URL=http://commerce:5002
    expose:
      - "3000"
    depends_on:
      - core
      - commerce
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.5"
    networks:
      - frontend_network
      - backend_network
    restart: unless-stopped

  # ============================================================
  # NGINX REVERSE PROXY (Port 6005)
  # Routes all API calls to appropriate backend services
  # ============================================================

  nginx:
    image: nginx:alpine
    container_name: aarya_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - core
      - commerce
      - payment
      - admin
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - frontend_network
      - backend_network
    restart: unless-stopped

  # ============================================================
  # SSL CERTIFICATE MANAGEMENT (Certbot)
  # ============================================================

  certbot:
    image: certbot/certbot
    container_name: aarya_certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    profiles:
      - tools
    networks:
      - frontend_network

  # ============================================================
  # PAYMENT RECOVERY WORKER (RQ Worker)
  # ============================================================
  # Background worker that processes payment recovery jobs.
  # Runs every 5 minutes to find orphaned payments and create orders.

  payment-worker:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    container_name: aarya_payment_worker
    command: python -m jobs.worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/aarya_clothing
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - COMMERCE_SERVICE_URL=http://commerce:5002
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-aarya_internal_secret_change_me}
      # Database connection pool (PgBouncer-compatible)
      - DATABASE_POOL_SIZE=8
      - DATABASE_MAX_OVERFLOW=7
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      commerce:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; from redis import Redis; Redis(host='redis', port=6379, db=2, password=os.environ.get('REDIS_PASSWORD','')).ping()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - backend_network
    restart: unless-stopped

  # ============================================================
  # POSTGRES AUTOMATED BACKUPS
  # ============================================================

  pg-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: pg_backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=aarya_clothing
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - ./backups/postgres:/backups
    networks:
      - backend_network

  # ============================================================
  # DOZZLE - Real-time Container Log Viewer
  # ============================================================

  dozzle:
    image: amir20/dozzle:latest
    container_name: aarya_dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - frontend_network

  # ============================================================
  # PORTAINER CE - Container Management UI
  # ============================================================

  portainer:
    image: portainer/portainer-ce:latest
    container_name: aarya_portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    expose:
      - "9000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - frontend_network

# ============================================================
# NETWORK DEFINITIONS
# ============================================================

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge

# ============================================================
# VOLUME DEFINITIONS
# ============================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  portainer_data:
    driver: local
