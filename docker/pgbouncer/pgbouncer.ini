[databases]
aarya_clothing = host=postgres port=5432 dbname=aarya_clothing

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

# Auth: MD5 hash of (password + username) stored in userlist.txt.
# Format: "username" "md5" + md5(password + username)
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction

; Connection limits
max_client_conn = 500
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Timeouts
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 5
query_timeout = 30
query_wait_timeout = 10
client_idle_timeout = 0
client_login_timeout = 30

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Performance
tcp_keepalive = 1
tcp_keepcnt = 5
tcp_keepidle = 30
tcp_keepintvl = 10

; Security
admin_users = postgres
stats_users = postgres

; Memory
pkt_buf = 4096

; Compatibility
ignore_startup_parameters = extra_float_digits
