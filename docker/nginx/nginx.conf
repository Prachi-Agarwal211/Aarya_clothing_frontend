# Nginx Configuration for Aarya Clothing - PRODUCTION
# Domain: aaryaclothing.in, www.aaryaclothing.in
# SSL: Let's Encrypt
# Unified routing with /api/v1/ prefix - all services accessed through single origin

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS resolver for dynamic service IPs
    resolver 127.0.0.11 valid=10s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Proxy timeouts for API routes
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # ==========================================
    # HTTP SERVER - Redirect to HTTPS
    # ==========================================
    server {
        listen 80;
        server_name aaryaclothing.in www.aaryaclothing.in localhost;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================
    # HTTPS SERVER - Main Production Server
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name aaryaclothing.in www.aaryaclothing.in;

        # SSL Certificate Paths (Let's Encrypt)
        # Note: Replace self-signed with Let's Encrypt once DNS is configured
        # Run: certbot --nginx -d aaryaclothing.in -d www.aaryaclothing.in
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Configuration (Modern)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Upstream targets (resolved via Docker DNS)
        set $frontend_upstream "frontend:3000";
        set $core_upstream "core:5001";
        set $commerce_upstream "commerce:5002";
        set $payment_upstream "payment:5003";
        set $admin_upstream "admin:5004";

        # Client body size for file uploads
        client_max_body_size 50M;

        # Trust proxy headers from reverse proxy / SSL termination
        real_ip_header X-Forwarded-For;
        set_real_ip_from 0.0.0.0/0;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ==========================================
        # FRONTEND
        # ==========================================
        location / {
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Next.js static files
        location /_next/static/ {
            proxy_pass http://$frontend_upstream;
            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Next.js images
        location /_next/image {
            proxy_pass http://$frontend_upstream;
            proxy_cache_bypass $http_upgrade;
        }

        # ==========================================
        # CORE SERVICE (Port 5001) - Auth & Users
        # ==========================================

        # Health Check Endpoint
        location /health {
            proxy_pass http://$core_upstream/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentication endpoints (rate limited)
        location /api/v1/auth/ {
            limit_req zone=login burst=5 nodelay;

            proxy_pass http://$core_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User endpoints
        location /api/v1/users/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$core_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # COMMERCE SERVICE (Port 5002) - Products, Cart, Orders
        # ==========================================

        # Products API
        location = /api/v1/products {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/products/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Categories API (backward compat)
        location = /api/v1/categories {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/categories/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Collections API (unified with categories)
        location = /api/v1/collections {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/collections/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cart API
        location = /api/v1/cart {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/cart/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Orders API
        location /api/v1/orders {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Wishlist API
        location = /api/v1/wishlist {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/wishlist/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Addresses API
        location /api/v1/addresses {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Reviews API (exact match for POST /api/v1/reviews, then subpaths)
        location = /api/v1/reviews {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/reviews/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Inventory API
        location /api/v1/inventory/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Chat API — standard REST
        location /api/v1/chat/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # REAL-TIME: WebSocket & SSE
        # ==========================================

        # WebSocket — Customer-Admin Chat
        location ~ ^/api/v1/chat/ws/ {
            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # SSE — Order Status Events
        location ~ ^/api/v1/orders/\d+/events$ {
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 86400;
        }

        # Internal service-to-service — Reservation confirm/release
        # Requires X-Internal-Secret header for authentication
        location ~ ^/api/v1/internal/ {
            # Only accessible from internal Docker network
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;

            # Validate internal service secret header (checked in app layer)
            # Pass through to backend for validation

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Internal-Secret $http_x_internal_secret;
        }

        # Landing Page Config API (Public + Admin)
        # Routes to admin service which has both public and admin landing endpoints
        location /api/v1/landing/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Site Config API (logo, video URLs, etc.) - served by core service
        location /api/v1/site/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$core_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Customer Profile API (profile, order-history - implemented in commerce)
        location /api/v1/me/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Returns API
        location /api/v1/returns/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Pages API
        location /api/v1/pages/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Promotions API
        location /api/v1/promotions/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # PAYMENT SERVICE (Port 5003)
        # ==========================================

        # Payment config (singular - e.g. GET /api/v1/payment/config)
        location /api/v1/payment/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://$payment_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment API (plural)
        location /api/v1/payments/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://$payment_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment Webhooks (no auth required, higher rate limit)
        location /api/v1/webhooks/ {

            proxy_pass http://$payment_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # ADMIN SERVICE (Port 5004)
        # ==========================================

        # ALL admin routes -> Admin Service (single source of truth)
        location /api/v1/admin/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI API routes -> Admin Service
        location /api/v1/ai/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Staff API
        location /api/v1/staff/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
