# Nginx Configuration for Aarya Clothing
# Domain: aaryaclothing.in, www.aaryaclothing.in
# SSL: Supports both Let's Encrypt (production) and self-signed (development)
# Unified routing with /api/v1/ prefix - all services accessed through single origin
#
# SSL MODE SELECTION:
# - Production: Mount Let's Encrypt certs to /etc/nginx/ssl/ (certbot default paths)
# - Development: Mount self-signed certs to same paths OR use docker-compose.dev.yml
#
# To switch modes, change the certificate files mounted via Docker volumes.
# No config changes needed - the same config works for both modes.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS resolver for dynamic service IPs
    resolver 127.0.0.11 valid=10s;

    # Upstream blocks for backend services with connection pooling
    upstream frontend_server {
        server frontend:3000;
        keepalive 32;
    }

    upstream core_server {
        server core:5001;
        keepalive 16;
    }

    upstream commerce_server {
        server commerce:5002;
        keepalive 16;
    }

    upstream payment_server {
        server payment:5003;
        keepalive 8;
    }

    upstream admin_server {
        server admin:5004;
        keepalive 8;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression - optimized for web assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Proxy buffer optimization - prevents buffering issues with large responses
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;

    # Proxy timeouts for API routes
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=5r/s;

    # ==========================================
    # HTTP SERVER - Development / Redirect to HTTPS
    # ==========================================
    server {
        listen 80;
        server_name aaryaclothing.in www.aaryaclothing.in localhost;

        # ACME challenge for Let's Encrypt (production)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Development mode: Serve without redirect when SSL certs are self-signed
        # Production mode: Redirect all HTTP traffic to HTTPS
        # Detection: If SSL certs exist and are valid, redirect. Otherwise, serve content.
        location / {
            # Check if this is production (valid Let's Encrypt certs)
            # In development, this serves content over HTTP
            # In production, this redirects to HTTPS (see HTTPS server below)
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================
    # HTTPS SERVER - Main Production Server
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name aaryaclothing.in www.aaryaclothing.in;

        # SSL Certificate Paths
        # Production: Let's Encrypt certs (auto-renewed by certbot)
        #   - Run: certbot --nginx -d aaryaclothing.in -d www.aaryaclothing.in
        #   - Certs stored at: /etc/letsencrypt/live/aaryaclothing.in/
        #   - Symlink or copy to: /etc/nginx/ssl/
        #
        # Development: Self-signed certs
        #   - Generate: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #               -keyout /etc/nginx/ssl/privkey.pem \
        #               -out /etc/nginx/ssl/fullchain.pem
        #   - Or mount via docker-compose.dev.yml volumes
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Configuration (Modern - Mozilla SSL Config Generator)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP Stapling (production only - requires valid Let's Encrypt cert)
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Client body size for file uploads
        client_max_body_size 50M;

        # Trust proxy headers from reverse proxy / SSL termination
        real_ip_header X-Forwarded-For;
        set_real_ip_from 0.0.0.0/0;

        # ==========================================
        # SECURITY HEADERS
        # ==========================================

        # Frame embedding protection - prevents clickjacking
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # XSS protection (legacy, modern browsers use CSP)
        add_header X-XSS-Protection "1; mode=block" always;

        # Control referrer information sent with requests
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HTTP Strict Transport Security - enforce HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Permissions Policy - disable unnecessary browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

        # Cross-Origin policies - prevent cross-origin attacks
        # Note: These may affect third-party integrations; test thoroughly
        # COEP set to 'credentialless' to allow Cloudflare Images and R2 resources
        # while still protecting credentialed cross-origin requests
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        # Content Security Policy - control resource loading
        # Allows Razorpay payment gateway and necessary third-parties
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.razorpay.com https://checkout.razorpay.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.razorpay.com wss://aaryaclothing.in https://www.google-analytics.com; frame-src 'self' https://*.razorpay.com; frame-ancestors 'none';" always;

        # ==========================================
        # FRONTEND
        # ==========================================
        location / {
            proxy_pass http://frontend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Next.js static files - aggressive caching (immutable)
        location /_next/static/ {
            proxy_pass http://frontend_server;
            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Next.js images
        location /_next/image {
            proxy_pass http://frontend_server;
            proxy_cache_bypass $http_upgrade;
        }

        # ==========================================
        # BROWSER CACHING - Static Assets
        # ==========================================

        # Images - cache for 1 year
        location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg)$ {
            proxy_pass http://frontend_server;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Fonts - cache for 1 year
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            proxy_pass http://frontend_server;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # CSS and JS - cache for 1 month (versioned by Next.js)
        location ~* \.(css|js)$ {
            proxy_pass http://frontend_server;
            expires 1M;
            add_header Cache-Control "public";
        }

        # ==========================================
        # REAL-TIME ROUTES (Must come BEFORE general API routes)
        # ==========================================

        # WebSocket — Customer-Admin Chat (regex must come before /api/v1/chat/)
        location ~ ^/api/v1/chat/ws/ {
            proxy_pass http://admin_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # SSE — Order Status Events (regex must come before /api/v1/orders)
        location ~ ^/api/v1/orders/\d+/events$ {
            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 86400;
        }

        # Internal service-to-service routes (must come before other /api/v1/ routes)
        # Requires X-Internal-Secret header for authentication
        location ~ ^/api/v1/internal/ {
            # Only accessible from internal Docker network
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Internal-Secret $http_x_internal_secret;
        }

        # ==========================================
        # CORE SERVICE (Port 5001) - Auth & Users
        # ==========================================

        # Health Check Endpoint (public)
        location /health {
            proxy_pass http://core_server/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentication endpoints (strict rate limiting)
        location /api/v1/auth/ {
            limit_req zone=login burst=5 nodelay;

            proxy_pass http://core_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User endpoints
        location /api/v1/users/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://core_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Site Config API (logo, video URLs, etc.) - served by core service
        location /api/v1/site/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://core_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # COMMERCE SERVICE (Port 5002) - Products, Cart, Orders
        # ==========================================

        # Products API (exact match first, then subpaths)
        location = /api/v1/products {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/products/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Categories API (exact match first, then subpaths)
        location = /api/v1/categories {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/categories/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Collections API (exact match first, then subpaths)
        location = /api/v1/collections {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/collections/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cart API (exact match first, then subpaths)
        location = /api/v1/cart {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/cart/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Orders API (general - SSE route is above with regex)
        location /api/v1/orders {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Wishlist API (exact match first, then subpaths)
        location = /api/v1/wishlist {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/wishlist/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Addresses API
        location /api/v1/addresses {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Reviews API (exact match first, then subpaths)
        location = /api/v1/reviews {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/reviews/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Inventory API
        location /api/v1/inventory/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Customer Profile API (profile, order-history - implemented in commerce)
        location /api/v1/me/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Returns API
        location /api/v1/returns/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Pages API
        location /api/v1/pages/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Promotions API
        location /api/v1/promotions/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://commerce_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # PAYMENT SERVICE (Port 5003)
        # ==========================================

        # Payment config (singular - e.g. GET /api/v1/payment/config)
        location /api/v1/payment/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://payment_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment API (plural)
        location /api/v1/payments/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://payment_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment Webhooks (rate limited, no auth - payment providers call this)
        location /api/v1/webhooks/ {
            limit_req zone=webhooks burst=10 nodelay;

            proxy_pass http://payment_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # ADMIN SERVICE (Port 5004)
        # ==========================================

        # Chat API — standard REST (WebSocket route is above)
        location /api/v1/chat/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://admin_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Landing Page Config API (Public + Admin)
        location /api/v1/landing/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://admin_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ALL admin routes -> Admin Service (single source of truth)
        location /api/v1/admin/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://admin_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI API routes -> Admin Service
        location /api/v1/ai/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://admin_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Staff API
        location /api/v1/staff/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://admin_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
