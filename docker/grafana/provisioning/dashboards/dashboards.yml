# Grafana dashboard provisioning
apiVersion: 1

providers:
  - name: "Aarya Dashboards"
    orgId: 1
    folder: "Aarya Clothing"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
      # Explicitly load these dashboard files:
      #   system-overview.json
      #   services-overview.json
      #   database-overview.json
      #   redis-overview.json
      #   containers-overview.json
      #   business-metrics.json
      #   overview.json (legacy)
