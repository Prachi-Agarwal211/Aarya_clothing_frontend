# Nginx Configuration for Aarya Clothing
# Domain: aaryaclothing.in, www.aaryaclothing.in
# SSL: Supports both Let's Encrypt (production) and self-signed (development)
# Unified routing with /api/v1/ prefix - all services accessed through single origin
#
# ╔══════════════════════════════════════════════════════════════╗
# ║                    ROUTING ARCHITECTURE                       ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Internet → :80/:443 (nginx)                                 ║
# ║    ├─ /              → frontend:3000 (Next.js SSR)           ║
# ║    ├─ /api/v1/auth/  → core:5001                             ║
# ║    ├─ /api/v1/users/ → core:5001                             ║
# ║    ├─ /api/v1/site/  → core:5001                             ║
# ║    ├─ /api/v1/products/ → commerce:5002                      ║
# ║    ├─ /api/v1/cart/     → commerce:5002                      ║
# ║    ├─ /api/v1/orders/   → commerce:5002                      ║
# ║    ├─ /api/v1/payments/ → payment:5003                       ║
# ║    ├─ /api/v1/webhooks/ → payment:5003                       ║
# ║    ├─ /api/v1/admin/    → admin:5004                         ║
# ║    └─ /api/v1/landing/  → admin:5004                         ║
# ║                                                               ║
# ║  HTTP (:80) → 301 redirect to HTTPS for external traffic      ║
# ║               → direct proxy for internal Docker SSR calls    ║
# ║                                                               ║
# ║  WebSocket: /api/v1/admin/chat/ws/ → admin:5004              ║
# ║             /api/v1/chat/ws/       → commerce:5002           ║
# ║  SSE:       /api/v1/orders/{id}/events → commerce:5002       ║
# ╚══════════════════════════════════════════════════════════════╝
#
# SSL MODE SELECTION:
# - Production: Mount Let's Encrypt certs to /etc/nginx/ssl/ (certbot default paths)
# - Development: Mount self-signed certs to same paths OR use docker-compose.dev.yml
#
# To switch modes, change the certificate files mounted via Docker volumes.
# No config changes needed - the same config works for both modes.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS resolver for dynamic service IPs
    resolver 127.0.0.11 valid=10s;

    # File cache for static file performance
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # SSL optimization
    ssl_buffer_size 4k;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Gzip compression - optimized for web assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Proxy buffer optimization - prevents buffering issues with large responses
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;

    # Proxy timeouts for API routes (less aggressive connect avoids spurious 502s under load)
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;

    # Rate limiting zones — INCREASED for production traffic
    # api: 50 requests/second — handles modern web app parallel requests
    # login: 5 requests/second — allows retry logic while preventing brute force
    # webhooks: 20 requests/second — handles payment gateway webhooks
    # public_read: 30 requests/second — public catalog browsing (products, collections, categories)
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=public_read:10m rate=30r/s;
    limit_req_status 429;

    # Connection limiting — max 50 simultaneous connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Detect internal Docker network requests (172.x.x.x) for HTTP→HTTPS redirect logic.
    # Internal SSR calls from frontend (nginx:80) are served directly.
    # External internet requests get redirected to HTTPS.
    map $http_x_forwarded_for $is_internal_request {
        default         0;
        "~^172\."       1;
        "~^10\."        1;
    }

    # ==========================================
    # HTTP SERVER - Development / Redirect to HTTPS
    # ==========================================
    server {
        listen 80;
        server_name aaryaclothing.in www.aaryaclothing.in localhost;

        # Dynamic upstream addresses — re-resolved by Docker DNS every 10s
        set $frontend_backend "frontend:3000";
        set $core_backend     "core:5001";
        set $commerce_backend "commerce:5002";
        set $payment_backend  "payment:5003";
        set $admin_backend    "admin:5004";

        # ACME challenge for Let's Encrypt (production)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ------------------------------------------------------------------
        # HTTP (:80) MUST mirror HTTPS routing for paths the frontend hits via
        # NEXT_PUBLIC_API_URL=http://nginx:80 (SSR, internal Docker calls).
        # Previously /api/v1/landing/ went to commerce while HTTPS went to admin,
        # causing different JSON for landing between SSR and browser.
        # ------------------------------------------------------------------

        # WebSocket — Admin Chat (before generic /api/v1/chat/)
        location ~ ^/api/v1/admin/chat/ws/ {
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # WebSocket — Customer Chat
        location ~ ^/api/v1/chat/ws/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # SSE — Order status (before /api/v1/orders)
        location ~ ^/api/v1/orders/\d+/events$ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 86400;
        }

        # Internal service-to-service (same as HTTPS)
        location ~ ^/api/v1/internal/ {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Internal-Secret $http_x_internal_secret;
        }

        # API Routes - Proxy to backend services (MUST be before location /)
        # Core API (auth, users, vitals, site config)
        location /api/v1/auth/ {
            limit_req zone=login burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/users/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/site/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/health {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/vitals {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Commerce API (products, collections, cart, orders, etc.)
        location /api/v1/products/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Collections API
        location = /api/v1/collections/ {
            # Canonicalize trailing-slash endpoint to avoid backend 307 ping-pong.
            return 308 /api/v1/collections;
        }

        location /api/v1/collections {
            limit_req zone=public_read burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/categories/ {
            limit_req zone=public_read burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/cart/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Guest order tracking — rate limited to prevent enumeration
        location ~ ^/api/v1/orders/track/ {
            limit_req zone=public_read burst=10 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/orders {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/wishlist/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/addresses {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/reviews/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/inventory/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Profile / customer "me" API (HTTPS parity — was missing on :80 → hit Next.js 404)
        location /api/v1/me {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/me/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/checkout {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/returns {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/returns/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/pages/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/promotions {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/size-guide {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Exact /api/v1/cart (no trailing slash) — prefix /cart/ does not match
        location = /api/v1/cart {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Public landing CMS — same service as HTTPS (admin), not commerce
        location /api/v1/landing/ {
            limit_req zone=public_read burst=50 nodelay;
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/search {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment API
        location /api/v1/payment {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/payments {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/webhooks {
            limit_req zone=webhooks burst=30 nodelay;
            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API
        location /api/v1/admin/ {
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Customer Chat REST — commerce (must be before general /api/v1/chat/ → admin)
        location ~ ^/api/v1/chat/rooms(/mine|$) {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Commerce only implements .../messages (close lives under /api/v1/admin/chat/rooms/.../close)
        location ~ ^/api/v1/chat/rooms/[0-9]+/messages {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Staff / AI chat admin API — admin service (matches HTTPS)
        location /api/v1/chat/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/ai/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/staff/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/super {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirect external internet traffic to HTTPS; serve internal Docker traffic directly.
        # Detection: X-Forwarded-For from Docker internal networks (172.x, 10.x) = internal SSR.
        # All other requests (direct browser access) get 301 → HTTPS.
        location / {
            if ($is_internal_request = 0) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://$frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            # Preserve explicit port (e.g. nginx:80) for internal Docker SSR calls.
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Nginx stub_status for Prometheus (internal only)
        location /nginx_status {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
            stub_status on;
            access_log off;
        }
    }

    # ==========================================
    # HTTPS SERVER - Main Production Server
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name aaryaclothing.in www.aaryaclothing.in;

        # SSL Certificate Paths
        # Production: Let's Encrypt certs (auto-renewed by certbot)
        #   - Run: certbot --nginx -d aaryaclothing.in -d www.aaryaclothing.in
        #   - Certs stored at: /etc/letsencrypt/live/aaryaclothing.in/
        #   - Symlink or copy to: /etc/nginx/ssl/
        #
        # Development: Self-signed certs
        #   - Generate: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #               -keyout /etc/nginx/ssl/privkey.pem \
        #               -out /etc/nginx/ssl/fullchain.pem
        #   - Or mount via docker-compose.dev.yml volumes
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Configuration (Modern - Mozilla SSL Config Generator)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP Stapling disabled (not required for all setups)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # resolver 8.8.8.8 8.8.4.4 valid=300s;
        # resolver_timeout 5s;

        # Client body size for file uploads
        client_max_body_size 50M;

        # Dynamic upstream addresses — re-resolved by Docker DNS every 10s
        set $frontend_backend "frontend:3000";
        set $core_backend     "core:5001";
        set $commerce_backend "commerce:5002";
        set $payment_backend  "payment:5003";
        set $admin_backend    "admin:5004";

        # Trust proxy headers only from Docker internal subnets
        real_ip_header X-Forwarded-For;
        set_real_ip_from 172.16.0.0/12;
        set_real_ip_from 10.0.0.0/8;
        set_real_ip_from 192.168.0.0/16;

        # Connection limit per IP
        limit_conn conn_per_ip 50;

        # ==========================================
        # SECURITY HEADERS
        # ==========================================

        # Frame embedding protection - prevents clickjacking
        # Changed from DENY to SAMEORIGIN to allow Razorpay payment modal iframe
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # XSS protection (legacy, modern browsers use CSP)
        add_header X-XSS-Protection "1; mode=block" always;

        # Control referrer information sent with requests
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HTTP Strict Transport Security - enforce HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Permissions Policy - disable unnecessary browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=*, usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

        # Cross-Origin policies - prevent cross-origin attacks
        # COEP set to 'credentialless' to allow Cloudflare Images and R2 resources
        # while still protecting credentialed cross-origin requests
        # COOP set to 'same-origin-allow-popups' to allow Razorpay 3DS popup callbacks
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        # Content Security Policy - control resource loading
        # FIXED: Added ALL Razorpay domains including cdn.razorpay.com for risk detection
        # Cashfree removed — only Razorpay payment gateway
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://api.razorpay.com https://lumberjack.razorpay.com https://cdn.razorpay.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://aaryaclothing.in https://www.aaryaclothing.in https://checkout.razorpay.com https://api.razorpay.com https://lumberjack.razorpay.com https://cdn.razorpay.com wss://api.razorpay.com wss://checkout.razorpay.com wss://aaryaclothing.in https://www.google-analytics.com https://*.r2.dev https://pub-7846c786f7154610b57735df47899fa0.r2.dev https://*.r2.cloudflarestorage.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com; worker-src 'self' blob: https://checkout.razorpay.com https://api.razorpay.com https://cdn.razorpay.com; form-action 'self' https://api.razorpay.com; frame-ancestors 'self'; media-src 'self' https://*.r2.dev https://pub-7846c786f7154610b57735df47899fa0.r2.dev https://*.r2.cloudflarestorage.com blob:;" always;

        # ==========================================
        # MONITORING — Prometheus, Grafana, Exporters
        # Accessible at https://aaryaclothing.in/monitoring/
        # Protected — restrict to admin IPs in production
        # ==========================================

        # Grafana Dashboard UI
        location /monitoring/ {
            # TODO: In production, restrict to admin IPs:
            # allow 1.2.3.4; deny all;
            proxy_pass http://grafana:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prometheus metrics endpoint (internal — not exposed publicly)
        # Prometheus scrapes services directly via Docker network

        # ==========================================
        # FRONTEND
        # ==========================================
        location / {
            proxy_pass http://$frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            # Preserve incoming host:port exactly.
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
            # CRITICAL: Never cache HTML pages in browsers.
            # Next.js rebuilds change chunk hashes — old cached HTML causes 404s on chunks.
            # Browsers must always fetch fresh HTML so they get current chunk URLs.
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # Favicon - redirect to logo.png
        location = /favicon.ico {
            return 302 /logo.png;
            access_log off;
            log_not_found off;
        }

        # Next.js static files — immutable cache (filenames contain content hash)
        # Safe to cache forever: when code changes, Next.js generates new filenames.
        location /_next/static/ {
            proxy_pass http://$frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Next.js images
        location /_next/image {
            proxy_pass http://$frontend_backend;
            proxy_cache_bypass $http_upgrade;
        }

        # ==========================================
        # BROWSER CACHING - Static Assets
        # ==========================================

        # Images - cache for 1 year
        location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg)$ {
            proxy_pass http://$frontend_backend;
            expires 1y;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "public, immutable";
        }

        # Fonts - cache for 1 year
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            proxy_pass http://$frontend_backend;
            expires 1y;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "public, immutable";
        }

        # NOTE: No generic .css/.js cache block — it would conflict with /_next/static/ immutable rule.
        # Next.js static chunks are handled by the /_next/static/ location above.
        # Non-hashed JS/CSS (rare) falls through to location / which sets no-cache.

        # ==========================================
        # REAL-TIME ROUTES (Must come BEFORE general API routes)
        # ==========================================

        # WebSocket — Admin Chat (must come before customer chat ws)
        # Admin chat WS endpoint routes to admin service (/api/v1/admin/chat/ws/{room_id})
        location ~ ^/api/v1/admin/chat/ws/ {
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # WebSocket — Customer Chat (regex must come before /api/v1/chat/)
        # WS endpoint lives in commerce service (/api/v1/chat/ws/{room_id})
        location ~ ^/api/v1/chat/ws/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # SSE — Order Status Events (regex must come before /api/v1/orders)
        location ~ ^/api/v1/orders/\d+/events$ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 86400;
        }

        # Internal service-to-service routes (must come before other /api/v1/ routes)
        # Requires X-Internal-Secret header for authentication
        location ~ ^/api/v1/internal/ {
            # Only accessible from internal Docker network
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Internal-Secret $http_x_internal_secret;
        }

        # ==========================================
        # CORE SERVICE (Port 5001) - Auth & Users
        # ==========================================

        # Health Check Endpoint (public)
        location /health {
            proxy_pass http://$core_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Health Check Endpoint (public)
        location /api/v1/health {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Web Vitals Collection Endpoint (POST only)
        location /api/vitals {
            # Only allow POST requests
            limit_except POST {
                deny all;
            }

            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentication endpoints (strict rate limiting)
        # INCREASED timeouts for OTP operations (Email/SMS can be slow)
        location /api/v1/auth/ {
            limit_req zone=login burst=50 nodelay;

            # Prevent caching of authentication responses
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Extended timeouts for OTP operations (Email SMTP + SMS API)
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # User endpoints
        location /api/v1/users/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Site Config API (logo, video URLs, etc.) - served by core service
        location /api/v1/site/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # COMMERCE SERVICE (Port 5002) - Products, Cart, Orders
        # ==========================================

        # Products API (exact match first, then subpaths)
        location = /api/v1/products {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/products/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Categories API (exact match first, then subpaths)
        location = /api/v1/categories {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/categories/ {
            limit_req zone=public_read burst=50 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Collections API
        location = /api/v1/collections/ {
            # Canonicalize trailing-slash endpoint to avoid backend 307 ping-pong.
            return 308 /api/v1/collections;
        }

        location /api/v1/collections {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cart API (exact match first, then subpaths)
        location = /api/v1/cart {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/cart/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Orders API (general - SSE route is above with regex)
        location /api/v1/orders {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Wishlist API (exact match first, then subpaths)
        location = /api/v1/wishlist {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/wishlist/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Addresses API
        location /api/v1/addresses {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Reviews API (exact match first, then subpaths)
        location = /api/v1/reviews {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/reviews/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Inventory API - exact match + subpaths
        location = /api/v1/inventory {
            limit_req zone=api burst=100 nodelay;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/inventory/ {
            limit_req zone=api burst=100 nodelay;

            # Prevent caching of API responses
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Customer Profile API (profile, order-history - implemented in commerce)
        location /api/v1/me {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/me/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Returns API (exact match + subpaths)
        location = /api/v1/returns {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/returns/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Pages API
        location /api/v1/pages/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Promotions API (prefix match covers /api/v1/promotions and /api/v1/promotions/...)
        location /api/v1/promotions {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Checkout API (stock validation, etc.) -> Commerce
        location /api/v1/checkout {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Search suggestions API -> Commerce
        location /api/v1/search {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Size guide API -> Commerce
        location /api/v1/size-guide {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # PAYMENT SERVICE (Port 5003)
        # ==========================================

        # Payment config (singular - e.g. GET /api/v1/payment/config)
        location /api/v1/payment {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment API (plural)
        location /api/v1/payments {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment Webhooks (rate limited, no auth - payment providers call this)
        location /api/v1/webhooks {
            limit_req zone=webhooks burst=10 nodelay;

            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # ADMIN SERVICE (Port 5004)
        # ==========================================

        # Customer Chat REST API (commerce service) — must come BEFORE general /api/v1/chat/ block
        location ~ ^/api/v1/chat/rooms(/mine|$) {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Commerce customer chat REST only has .../messages (not .../close)
        location ~ ^/api/v1/chat/rooms/[0-9]+/messages {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Chat Admin API — standard REST (WebSocket route is above)
        location /api/v1/chat/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Landing Page Config API (Public + Admin)
        location /api/v1/landing/ {
            limit_req zone=public_read burst=50 nodelay;
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ALL admin routes -> Admin Service (single source of truth)
        # INCREASED burst to 100 (was 20) to handle dashboard parallel requests
        location /api/v1/admin/ {
            limit_req zone=api burst=100 nodelay;

            # Prevent caching of API responses
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI SSE streaming endpoint — must come BEFORE general /api/v1/ai/ block
        # Requires proxy_buffering off so chunks reach the client in real-time
        location = /api/v1/ai/customer/chat/stream {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            # SSE: disable buffering so chunks flush immediately
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            proxy_read_timeout 120s;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store" always;
            add_header X-Accel-Buffering "no" always;
        }

        # AI API routes -> Admin Service - INCREASED burst
        location /api/v1/ai/ {
            limit_req zone=api burst=100 nodelay;
            # Prevent caching of API responses
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Super Admin API -> Admin Service
        location /api/v1/super {
            limit_req zone=api burst=20 nodelay;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Staff API - INCREASED burst
        location /api/v1/staff/ {
            limit_req zone=api burst=100 nodelay;
            # Prevent caching of API responses
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # MONITORING - Grafana Dashboard (protected by Grafana's own auth)
        # Access: https://aaryaclothing.in/monitoring/
        # Grafana requires login (configured via GF_SECURITY_ADMIN_*)
        # ==========================================

        location /monitoring/ {
            proxy_pass http://grafana:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Grafana-Org-Id 1;

            # WebSocket support for Grafana live features
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # No caching for dashboard data
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # Grafana API (for provisioning/alerts)
        location /monitoring-api/ {
            rewrite ^/monitoring-api/(.*) /api/$1 break;
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # NGINX STUB STATUS (for Prometheus scraping)
        # Internal only - not accessible from outside
        # ==========================================

        location /nginx_status {
            # Only allow internal access from Docker network
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            stub_status on;
            access_log off;
        }
    }
}
