# Nginx Configuration for Aarya Clothing
# Domain: aaryaclothing.in, www.aaryaclothing.in
# SSL: Supports both Let's Encrypt (production) and self-signed (development)
# Unified routing with /api/v1/ prefix - all services accessed through single origin
#
# SSL MODE SELECTION:
# - Production: Mount Let's Encrypt certs to /etc/nginx/ssl/ (certbot default paths)
# - Development: Mount self-signed certs to same paths OR use docker-compose.dev.yml
#
# To switch modes, change the certificate files mounted via Docker volumes.
# No config changes needed - the same config works for both modes.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS resolver for dynamic service IPs
    resolver 127.0.0.11 valid=10s;

    # NOTE: Dynamic upstream variables — nginx resolves these via the Docker DNS
    # resolver (127.0.0.11) every 10s. This ensures container IP changes after
    # docker-compose restarts are picked up automatically without nginx reload.
    # (Static upstream{} blocks cache DNS at startup and break when containers restart.)

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression - optimized for web assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Proxy buffer optimization - prevents buffering issues with large responses
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;

    # Proxy timeouts for API routes
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Rate limiting zones - INCREASED for production traffic
    # api: 50 requests/second (was 10) - handles modern web app parallel requests
    # login: 5 requests/second (was 1) - allows for retry logic while preventing brute force
    # webhooks: 20 requests/second (was 5) - handles payment gateway webhooks
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=20r/s;

    # ==========================================
    # HTTP SERVER - Development / Redirect to HTTPS
    # ==========================================
    server {
        listen 80;
        server_name aaryaclothing.in www.aaryaclothing.in localhost;

        # Dynamic upstream addresses — re-resolved by Docker DNS every 10s
        set $frontend_backend "frontend:3000";
        set $core_backend     "core:5001";
        set $commerce_backend "commerce:5002";
        set $payment_backend  "payment:5003";
        set $admin_backend    "admin:5004";

        # ACME challenge for Let's Encrypt (production)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API Routes - Proxy to backend services (MUST be before location /)
        # Core API (auth, users, vitals, site config)
        location /api/v1/auth/ {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/users/ {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/site/ {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/health {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/vitals {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Commerce API (products, collections, cart, orders, etc.)
        location /api/v1/products/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/collections/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/categories/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/cart/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/orders {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/wishlist/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/addresses {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/reviews/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/inventory/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/landing/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/search {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment API
        location /api/v1/payment {
            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/payments {
            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/webhooks {
            proxy_pass http://$payment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API
        location /api/v1/admin/ {
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI Chat API
        location /api/v1/chat/ {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/ai/ {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Development mode: Serve without redirect when SSL certs are self-signed
        # Production mode: Redirect all HTTP traffic to HTTPS
        # Detection: If SSL certs exist and are valid, redirect. Otherwise, serve content.
        location / {
            # Serve content over HTTP for internal Docker network requests
            # External requests (from internet) are redirected to HTTPS
            # Internal requests (from Docker containers) are served directly
            proxy_pass http://$frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }
    }

    # ==========================================
    # HTTPS SERVER - Main Production Server
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name aaryaclothing.in www.aaryaclothing.in;

        # SSL Certificate Paths
        # Production: Let's Encrypt certs (auto-renewed by certbot)
        #   - Run: certbot --nginx -d aaryaclothing.in -d www.aaryaclothing.in
        #   - Certs stored at: /etc/letsencrypt/live/aaryaclothing.in/
        #   - Symlink or copy to: /etc/nginx/ssl/
        #
        # Development: Self-signed certs
        #   - Generate: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #               -keyout /etc/nginx/ssl/privkey.pem \
        #               -out /etc/nginx/ssl/fullchain.pem
        #   - Or mount via docker-compose.dev.yml volumes
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Configuration (Modern - Mozilla SSL Config Generator)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP Stapling disabled (not required for all setups)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # resolver 8.8.8.8 8.8.4.4 valid=300s;
        # resolver_timeout 5s;

        # Client body size for file uploads
        client_max_body_size 50M;

        # Dynamic upstream addresses — re-resolved by Docker DNS every 10s
        set $frontend_backend "frontend:3000";
        set $core_backend     "core:5001";
        set $commerce_backend "commerce:5002";
        set $payment_backend  "payment:5003";
        set $admin_backend    "admin:5004";

        # Trust proxy headers only from Docker internal subnets
        real_ip_header X-Forwarded-For;
        set_real_ip_from 172.16.0.0/12;
        set_real_ip_from 10.0.0.0/8;
        set_real_ip_from 192.168.0.0/16;

        # ==========================================
        # SECURITY HEADERS
        # ==========================================

        # Frame embedding protection - prevents clickjacking
        # Changed from DENY to SAMEORIGIN to allow Razorpay payment modal iframe
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # XSS protection (legacy, modern browsers use CSP)
        add_header X-XSS-Protection "1; mode=block" always;

        # Control referrer information sent with requests
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HTTP Strict Transport Security - enforce HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Permissions Policy - disable unnecessary browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=*, usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

        # Cross-Origin policies - prevent cross-origin attacks
        # COEP set to 'credentialless' to allow Cloudflare Images and R2 resources
        # while still protecting credentialed cross-origin requests
        # COOP set to 'same-origin-allow-popups' to allow Razorpay 3DS popup callbacks
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        # Content Security Policy - control resource loading
        # FIXED: Added ALL Razorpay domains including cdn.razorpay.com for risk detection
        # FIXED: Added production domain and API endpoints (connect-src)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://api.razorpay.com https://lumberjack.razorpay.com https://cdn.razorpay.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://aaryaclothing.in https://www.aaryaclothing.in https://checkout.razorpay.com https://api.razorpay.com https://lumberjack.razorpay.com https://cdn.razorpay.com wss://api.razorpay.com wss://checkout.razorpay.com wss://aaryaclothing.in https://www.google-analytics.com https://*.r2.dev https://pub-7846c786f7154610b57735df47899fa0.r2.dev https://*.r2.cloudflarestorage.com; frame-src 'self' https://checkout.razorpay.com https://api.razorpay.com; worker-src 'self' blob: https://checkout.razorpay.com https://api.razorpay.com https://cdn.razorpay.com; form-action 'self' https://api.razorpay.com; frame-ancestors 'self'; media-src 'self' https://*.r2.dev https://pub-7846c786f7154610b57735df47899fa0.r2.dev https://*.r2.cloudflarestorage.com blob:;" always;

        # ==========================================
        # FRONTEND
        # ==========================================
        location / {
            proxy_pass http://$frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Favicon - redirect to logo.png
        location = /favicon.ico {
            return 302 /logo.png;
            access_log off;
            log_not_found off;
        }

        # Next.js static files - aggressive caching (immutable)
        location /_next/static/ {
            proxy_pass http://$frontend_backend;
            proxy_cache_bypass $http_upgrade;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Next.js images
        location /_next/image {
            proxy_pass http://$frontend_backend;
            proxy_cache_bypass $http_upgrade;
        }

        # ==========================================
        # BROWSER CACHING - Static Assets
        # ==========================================

        # Images - cache for 1 year
        location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg)$ {
            proxy_pass http://$frontend_backend;
            expires 1y;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "public, immutable";
        }

        # Fonts - cache for 1 year
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            proxy_pass http://$frontend_backend;
            expires 1y;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "public, immutable";
        }

        # CSS and JS - cache for 1 month (versioned by Next.js)
        location ~* \.(css|js)$ {
            proxy_pass http://$frontend_backend;
            expires 1M;
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "public";
        }

        # ==========================================
        # REAL-TIME ROUTES (Must come BEFORE general API routes)
        # ==========================================

        # WebSocket — Admin Chat (must come before customer chat ws)
        # Admin chat WS endpoint routes to admin service (/api/v1/admin/chat/ws/{room_id})
        location ~ ^/api/v1/admin/chat/ws/ {
            proxy_pass http://$admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # WebSocket — Customer Chat (regex must come before /api/v1/chat/)
        # WS endpoint lives in commerce service (/api/v1/chat/ws/{room_id})
        location ~ ^/api/v1/chat/ws/ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # SSE — Order Status Events (regex must come before /api/v1/orders)
        location ~ ^/api/v1/orders/\d+/events$ {
            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 86400;
        }

        # Internal service-to-service routes (must come before other /api/v1/ routes)
        # Requires X-Internal-Secret header for authentication
        location ~ ^/api/v1/internal/ {
            # Only accessible from internal Docker network
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://$commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Internal-Secret $http_x_internal_secret;
        }

        # ==========================================
        # CORE SERVICE (Port 5001) - Auth & Users
        # ==========================================

        # Health Check Endpoint (public)
        location /health {
            proxy_pass http://$core_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Health Check Endpoint (public)
        location /api/v1/health {
            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Web Vitals Collection Endpoint (POST only)
        location /api/vitals {
            # Only allow POST requests
            limit_except POST {
                deny all;
            }

            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentication endpoints (strict rate limiting)
        # INCREASED timeouts for OTP operations (Email/SMS can be slow)
        location /api/v1/auth/ {
            limit_req zone=login burst=50 nodelay;

            # Prevent caching of authentication responses
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Extended timeouts for OTP operations (Email SMTP + SMS API)
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # User endpoints
        location /api/v1/users/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Site Config API (logo, video URLs, etc.) - served by core service
        location /api/v1/site/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$core_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
